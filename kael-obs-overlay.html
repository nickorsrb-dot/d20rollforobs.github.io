<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Каэль — OBS Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600;900&display=swap" rel="stylesheet">
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: transparent;
    font-family: 'Cormorant Garamond', Georgia, serif;
    width: 420px;
    overflow: hidden;
  }

  /* Card */
  .card {
    width: 420px;
    background: rgba(10, 8, 6, 0.92);
    border-left: 3px solid #b8d0e0;
    padding: 20px 24px 22px;
    position: relative;
    overflow: hidden;
    opacity: 0;
    transform: translateX(440px);
    transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.22,1,0.36,1);
  }

  .card.visible {
    opacity: 1;
    transform: translateX(0);
  }

  .card.gold { border-left-color: #c8a040; }

  /* Subtle background glow */
  .card::before {
    content:'';
    position:absolute; inset:0;
    background: radial-gradient(ellipse 80% 100% at 0% 50%, rgba(184,208,224,0.06) 0%, transparent 60%);
    pointer-events:none;
  }

  .card.gold::before {
    background: radial-gradient(ellipse 80% 100% at 0% 50%, rgba(200,160,64,0.06) 0%, transparent 60%);
  }

  /* Top row */
  .top-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }

  .roll-num {
    font-family: 'Cinzel', serif;
    font-size: 44px;
    font-weight: 900;
    line-height: 1;
    color: #b8d0e0;
    min-width: 52px;
  }

  .roll-num.gold { color: #c8a040; }

  .top-meta {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .tag {
    font-family: 'Cinzel', serif;
    font-size: 8px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    padding: 2px 8px;
    border: 1px solid currentColor;
    display: inline-block;
    opacity: 0.85;
    width: fit-content;
  }

  .ev-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    color: #f0e4ce;
    line-height: 1.1;
  }

  /* Description */
  .ev-desc {
    font-size: 15px;
    color: #b8a078;
    line-height: 1.55;
    margin-bottom: 4px;
  }

  /* Hint */
  .ev-hint {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: #786020;
    opacity: 0.8;
  }

  /* Viewer + divider */
  .bottom-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid rgba(255,255,255,0.07);
  }

  .hawk { font-size: 14px; opacity: 0.6; }

  .viewer-name {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.3em;
    color: #6a5840;
    text-transform: uppercase;
    opacity: 0.8;
  }

  /* Progress bar — auto dismiss */
  .progress {
    position: absolute;
    bottom: 0; left: 0;
    height: 2px;
    background: #b8d0e0;
    width: 100%;
    transform-origin: left;
    transition: transform linear;
  }

  .progress.gold { background: #c8a040; }

  /* Tag colours */
  .c-rik        { color: #b8d0e0; }
  .c-char       { color: #c8a040; }
  .c-world      { color: #90b870; }
  .c-limit      { color: #c87040; }
  .c-bonus      { color: #a080c0; }
  .c-underground{ color: #6a90a8; }
  .c-above      { color: #b8d0e0; }
  .c-dark       { color: #c87040; }
  .c-depth      { color: #c8a040; }
  .c-open       { color: #90b870; }
</style>
</head>
<body>

<div class="card" id="card">
  <div class="top-row">
    <div class="roll-num" id="rollNum">—</div>
    <div class="top-meta">
      <span class="tag" id="tagEl"></span>
      <div class="ev-name" id="evName"></div>
    </div>
  </div>
  <div class="ev-desc" id="evDesc"></div>
  <div class="ev-hint" id="evHint"></div>
  <div class="bottom-row">
    <span class="hawk">🦅</span>
    <span class="viewer-name" id="viewerName"></span>
  </div>
  <div class="progress" id="progress"></div>
</div>

<script>
const tagColors = {
  rik:'c-rik', char:'c-char', world:'c-world', limit:'c-limit', bonus:'c-bonus',
  underground:'c-underground', above:'c-above', dark:'c-dark', depth:'c-depth', open:'c-open'
};

let dismissTimer = null;
let progressAnim = null;
const DISPLAY_MS = 9000;

const card     = document.getElementById('card');
const rollNum  = document.getElementById('rollNum');
const tagEl    = document.getElementById('tagEl');
const evName   = document.getElementById('evName');
const evDesc   = document.getElementById('evDesc');
const evHint   = document.getElementById('evHint');
const viewerName = document.getElementById('viewerName');
const progress = document.getElementById('progress');

// Ably — subscribe only key
const ably = new Ably.Realtime('L2nSig.3VeRpw:fIUr3OhUICfj9dJZEv14XaV3TAyG6lwT6NhIKnhIYZ4');
const channel = ably.channels.get('kael-rolls');

channel.subscribe('roll', (msg) => {
  showRoll(msg.data);
});

function showRoll(d) {
  // Clear previous timers
  if (dismissTimer) clearTimeout(dismissTimer);
  if (progressAnim) cancelAnimationFrame(progressAnim);

  // Fill content
  const isGold = d.isGold;
  card.className = 'card' + (isGold ? ' gold' : '');
  rollNum.className = 'roll-num' + (isGold ? ' gold' : '');
  rollNum.textContent = d.roll;

  tagEl.className = 'tag ' + (tagColors[d.tag] || '');
  tagEl.textContent = d.tagLabel;

  evName.textContent = d.name;
  evDesc.textContent = d.desc;
  evHint.textContent = d.hint ? '→ ' + d.hint : '';
  evHint.style.display = d.hint ? 'block' : 'none';
  viewerName.textContent = d.viewer + ' бросил кубик';

  progress.className = 'progress' + (isGold ? ' gold' : '');
  progress.style.transition = 'none';
  progress.style.transform = 'scaleX(1)';

  // Show
  card.classList.add('visible');

  // Animate progress bar
  const start = performance.now();
  function tick(now) {
    const elapsed = now - start;
    const remaining = Math.max(0, 1 - elapsed / DISPLAY_MS);
    progress.style.transition = 'none';
    progress.style.transform = `scaleX(${remaining})`;
    if (remaining > 0) {
      progressAnim = requestAnimationFrame(tick);
    }
  }
  progressAnim = requestAnimationFrame(tick);

  // Dismiss
  dismissTimer = setTimeout(() => {
    card.classList.remove('visible');
  }, DISPLAY_MS);
}
</script>
</body>
</html>
