// ── TWITCH AUTH ───────────────────────────────────────────
function twitchLogin() {
  const state = Math.random().toString(36).slice(2);
  localStorage.setItem('tw_state', state);
  localStorage.setItem('tw_pending', '1'); // flag: login in progress
  localStorage.setItem('tw_return', window.location.href.split('#')[0]);
  const url = [
    'https://id.twitch.tv/oauth2/authorize',
    '?client_id='    + CLIENT_ID,
    '&redirect_uri=' + encodeURIComponent(REDIRECT_URI),
    '&response_type=token+id_token',
    '&scope=openid',
    '&claims=' + encodeURIComponent(JSON.stringify({id_token:{preferred_username:null},userinfo:{preferred_username:null}})),
    '&state='   + state,
    '&force_verify=false'
  ].join('');
  window.location.href = url;
}

function parseJWT(token) {
  try {
    const base64 = token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
    return JSON.parse(atob(base64));
  } catch { return null; }
}

function handleCallback() {
  // Check both hash and search params — Twitch sometimes varies
  const raw    = window.location.hash.substring(1) || window.location.search.substring(1);
  const params = new URLSearchParams(raw);
  const token  = params.get('access_token');
  const idTok  = params.get('id_token');

  if (!token) return false;

  let name = null;

  // Try id_token first — most reliable
  if (idTok) {
    const payload = parseJWT(idTok);
    name = payload?.preferred_username || payload?.login || payload?.sub || null;
  }

  // Fallback to access_token payload
  if (!name && token) {
    const payload = parseJWT(token);
    name = payload?.login || payload?.preferred_username || payload?.sub || null;
  }

  if (!name) name = 'Зритель';

  user = { name };

  // Save to localStorage (survives page reload, unlike sessionStorage)
  localStorage.setItem('tw_user', JSON.stringify(user));

  // Clean URL immediately before any redirect can happen
  history.replaceState(null, '', window.location.pathname);
  return true;
}

function logout() {
  user = null;
  localStorage.removeItem('tw_user');
  localStorage.removeItem('tw_state');
  showLogin();
}

function showLogin() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('userBar').classList.remove('visible');
  document.getElementById('rollUI').classList.remove('visible');
}

function showRoll() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('userBar').classList.add('visible');
  document.getElementById('rollUI').classList.add('visible');
  document.getElementById('userName').textContent     = user.name;
  document.getElementById('userInitials').textContent = user.name[0].toUpperCase();
  checkCooldown();
}

// ── INIT ──────────────────────────────────────────────────
function init() {
  // 1. Token arrived in hash — parse and save
  if (window.location.hash.includes('access_token')) {
    localStorage.removeItem('tw_pending');
    if (handleCallback()) { showRoll(); return; }
  }

  // 2. Saved session exists — use it
  const saved = localStorage.getItem('tw_user');
  if (saved) { user = JSON.parse(saved); showRoll(); return; }

  // 3. Login was started but we came back without a token —
  //    this happens when Twitch shows the "leaving Twitch" warning
  //    and the redirect strips the hash. Auto-retry silently.
  if (localStorage.getItem('tw_pending') === '1') {
    localStorage.removeItem('tw_pending');
    // Small delay so page renders before redirect
    setTimeout(twitchLogin, 100);
    return;
  }

  showLogin();
}
init();

// ── TYPE SELECT ───────────────────────────────────────────
function selectType(t) {
  currentType = t;
  document.getElementById('btn-event').className = 'type-btn' + (t==='event'?' sel-sky':'');
  document.getElementById('btn-call').className  = 'type-btn' + (t==='call' ?' sel-gold':'');
}

// ── COOLDOWN ──────────────────────────────────────────────
function getCooldownKey() { return 'cd_' + (user?.name||'anon'); }

function checkCooldown() {
  const last = parseInt(localStorage.getItem(getCooldownKey())||'0');
  const remaining = COOLDOWN_MS - (Date.now() - last);
  if (remaining > 0) {
    startCooldownUI(remaining);
  }
}

function startCooldownUI(ms) {
  onCooldown = true;
  const btn  = document.getElementById('rollBtn');
  const fill = document.getElementById('cdFill');
  const info = document.getElementById('cdInfo');
  btn.disabled = true;

  const end = Date.now() + ms;

  if (cdInterval) clearInterval(cdInterval);
  cdInterval = setInterval(() => {
    const left = end - Date.now();
    if (left <= 0) {
      clearInterval(cdInterval);
      fill.style.width = '0%';
      btn.disabled = false;
      onCooldown = false;
      info.textContent = '';
      info.classList.remove('visible');
      return;
    }
    const pct = ((COOLDOWN_MS - left) / COOLDOWN_MS) * 100;
    fill.style.width = pct + '%';
    const secs = Math.ceil(left / 1000);
    const mins = Math.floor(secs / 60);
    const s    = secs % 60;
    info.textContent = `Следующий бросок через ${mins}:${String(s).padStart(2,'0')}`;
    info.classList.add('visible');
  }, 500);
}

// ── QUEUE ─────────────────────────────────────────────────
// Queue is handled server-side via Ably channel state
// Client-side: we track if overlay is busy via a shared flag
let overlayBusy  = false;
let pendingRoll  = null;

// Subscribe to know when overlay finishes (overlay publishes 'done' after dismiss)
ablyChannel.subscribe('done', () => {
  overlayBusy = false;
  if (pendingRoll) {
    const r = pendingRoll;
    pendingRoll = null;
    publishRoll(r);
  }
  document.getElementById('queueInfo').classList.remove('visible');
});

ablyChannel.subscribe('busy', () => {
  overlayBusy = true;
});

// ── ROLL ──────────────────────────────────────────────────
function doRoll() {
  if (onCooldown || !user) return;

  const n    = Math.floor(Math.random()*20)+1;
  const data = currentType === 'event' ? events : calls;
  const e    = data[n-1];
  const isGold = currentType === 'call';

  const payload = {
    roll:n, type:currentType,
    tag:e.tag, tagLabel:e.tl,
    name:e.name, desc:e.desc,
    hint:e.hint||null,
    viewer:user.name,
    isGold
  };

  // Show locally
  showResult(n, e, isGold);

  // Save cooldown
  localStorage.setItem(getCooldownKey(), Date.now().toString());
  startCooldownUI(COOLDOWN_MS);

  // Send or queue
  if (overlayBusy) {
    if (pendingRoll) {
      // Already something queued — reject
      setStatus('Очередь занята, попробуй чуть позже', 'err');
      return;
    }
    pendingRoll = payload;
    document.getElementById('queueInfo').classList.add('visible');
    document.getElementById('queueText').textContent = 'Твой бросок в очереди — появится следующим';
    setStatus('Встал в очередь', 'sending');
  } else {
    publishRoll(payload);
  }
}

function publishRoll(payload) {
  overlayBusy = true;
  setStatus('Отправляем на стрим...', 'sending');
  ablyChannel.publish('roll', payload, (err) => {
    if (err) { setStatus('Ошибка отправки', 'err'); overlayBusy = false; }
    else     setStatus('Результат на стриме!', 'ok');
  });
  // Also publish busy signal for other clients
  ablyChannel.publish('busy', {});
}

function showResult(n, e, isGold) {
  const card = document.getElementById('resultCard');
  const nc   = isGold ? 'gold' : 'sky';
  card.className = 'result-card has-' + nc;
  card.innerHTML = `
    <div class="result-num ${nc} popped">${n}</div>
    <span class="result-tag ${TC[e.tag]}">${e.tl}</span>
    <div class="result-name">${e.name}</div>
    <div class="result-desc">${e.desc}</div>
    ${e.hint ? `<p class="result-hint">→ ${e.hint}</p>` : ''}
  `;
}

function setStatus(msg, cls) {
  const el = document.getElementById('status');
  el.textContent = msg; el.className = 'status '+(cls||'');
}
</script>
